<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Opening Battle</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --font-sans: 'Poppins', sans-serif;
  --bg-main: #0b0c10;
  --bg-card: rgba(31, 40, 51, 0.7);
  --accent: #66fcf1;
  --accent-dim: #45a29e;
  --text-main: #ffffff;
  --text-muted: #c5c6c7;
  --border-radius: 16px;
  --glow: 0 0 15px rgba(102, 252, 241, 0.4);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-sans);
  background: var(--bg-main);
  background-image: radial-gradient(circle at top right, #1f2833 0%, transparent 40%),
                    radial-gradient(circle at bottom left, #12181f 0%, transparent 40%);
  color: var(--text-main);
  min-height: 100vh;
}

.arena { max-width: 900px; margin: 0 auto; padding: 2rem 1rem; min-height: 600px; }

.header { text-align: center; margin-bottom: 2rem; }
.header h1 { font-size: 28px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; text-shadow: var(--glow); margin-bottom: 8px; }
.header p { font-size: 14px; color: var(--text-muted); }

.progress-bar-wrap { background: rgba(255,255,255,0.05); border-radius: 99px; height: 8px; margin: 20px 0; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
.progress-bar-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: var(--glow); }

.battle-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 1.5rem; align-items: center; margin-bottom: 1.5rem; }

.vs-badge { font-size: 24px; font-weight: 700; color: var(--bg-main); background: var(--accent); width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border-radius: 50%; box-shadow: var(--glow); margin: 0 auto; z-index: 2; }

.card { background: var(--bg-card); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--border-radius); overflow: hidden; transition: all 0.3s ease; }
.card:hover { border-color: var(--accent); transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.5), var(--glow); }

.yt-wrap { position: relative; padding-top: 56.25%; background: #000; border-bottom: 1px solid rgba(255,255,255,0.05); }
.yt-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

.card-info { padding: 1.2rem; text-align: center; }
.card-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.card-sub { font-size: 13px; font-weight: 500; letter-spacing: 0.5px; margin-bottom: 15px; }

.vote-btn { width: 100%; padding: 12px; border: 2px solid var(--accent-dim); border-radius: 8px; background: transparent; cursor: pointer; font-size: 14px; font-weight: 600; color: var(--accent); font-family: var(--font-sans); transition: all 0.2s; text-transform: uppercase; }
.vote-btn:hover { background: var(--accent); color: var(--bg-main); box-shadow: var(--glow); }
.vote-btn:active { transform: scale(0.97); }

.skip-row { text-align: center; margin-top: 1rem; }
.skip-btn { background: none; border: none; font-size: 13px; color: var(--text-muted); cursor: pointer; transition: color 0.2s; }
.skip-btn:hover { color: var(--text-main); text-decoration: underline; }

.rankings { padding: 1.5rem 0; }
.rank-item { display: flex; align-items: center; gap: 15px; padding: 12px 16px; background: var(--bg-card); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; margin-bottom: 10px; transition: transform 0.2s; }
.rank-item:hover { transform: translateX(5px); background: rgba(31, 40, 51, 0.9); border-color: rgba(255,255,255,0.2); }
.rank-item.gold { border: 1px solid #FFD700; box-shadow: 0 0 10px rgba(255, 215, 0, 0.2); }
.rank-item.silver { border: 1px solid #C0C0C0; }
.rank-item.bronze { border: 1px solid #CD7F32; }

.rank-num { font-size: 20px; font-weight: 700; min-width: 35px; color: var(--text-muted); }
.rank-info { flex: 1; }
.rank-title { font-size: 15px; font-weight: 600; }
.rank-sub { font-size: 12px; margin-top: 2px; }
.rank-score { font-size: 16px; font-weight: 700; color: var(--accent); min-width: 60px; text-align: right; }

.elo-bar-wrap { height: 4px; background: rgba(255,255,255,0.1); border-radius: 99px; margin-top: 8px; overflow: hidden; }
.elo-bar { height: 100%; background: var(--accent); border-radius: 99px; box-shadow: var(--glow); }

.medal { font-size: 24px; min-width: 35px; }

.winner-banner { text-align: center; padding: 2.5rem 1rem; background: linear-gradient(135deg, rgba(31,40,51,0.9), rgba(11,12,16,0.9)); border-radius: var(--border-radius); border: 1px solid var(--accent); box-shadow: var(--glow); margin-bottom: 2rem; }
.winner-banner .big { font-size: 50px; margin-bottom: 10px; animation: bounce 2s infinite; }
.winner-banner h2 { font-size: 24px; font-weight: 700; color: var(--accent); }
.winner-banner p { font-size: 15px; color: var(--text-muted); margin-top: 8px; }

.intro { text-align: center; padding: 3rem 1rem; background: var(--bg-card); border-radius: var(--border-radius); border: 1px solid rgba(255,255,255,0.1); margin-top: 2rem; }
.intro h2 { font-size: 24px; font-weight: 600; margin-bottom: 12px; color: var(--text-main); }
.intro p { font-size: 15px; color: var(--text-muted); margin-bottom: 2rem; line-height: 1.6; }

.start-btn { padding: 14px 40px; background: var(--accent); color: var(--bg-main); border: none; border-radius: 8px; font-size: 16px; font-weight: 700; font-family: var(--font-sans); cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 1px; box-shadow: var(--glow); }
.start-btn:hover { transform: translateY(-2px); box-shadow: 0 0 25px rgba(102, 252, 241, 0.6); background: #7ffff8; }
.restart-btn { display: block; width: 100%; max-width: 300px; margin: 2rem auto 0; padding: 14px; border: 2px solid var(--accent-dim); border-radius: 8px; background: transparent; cursor: pointer; font-size: 14px; font-weight: 600; color: var(--accent); transition: all 0.2s; text-transform: uppercase; }
.restart-btn:hover { background: var(--accent); color: var(--bg-main); box-shadow: var(--glow); }

@keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
@media (max-width: 768px) { .battle-grid { grid-template-columns: 1fr; gap: 1rem; } .vs-badge { margin: -10px auto; } }
</style>
</head>
<body>

<div class="arena" id="app"></div>

<script>
// Highly verified, official, and embeddable YouTube links
const openings = [
  {id:'aot6', title:'The Rumbling', anime:'Attack on Titan', ep:'OP 6', vid:'2S4qGKmzBJE', color:'#8b0000'},
  {id:'jjk1', title:'Kaikai Kitan', anime:'Jujutsu Kaisen', ep:'OP 1', vid:'v8bZVdTgXoY', color:'#1B5E20'},
  {id:'csm1', title:'KICK BACK', anime:'Chainsaw Man', ep:'OP 1', vid:'dFlDRhvM4L0', color:'#B71C1C'},
  {id:'osk1', title:'Idol', anime:'Oshi No Ko', ep:'OP 1', vid:'ZRtdQ81jPUQ', color:'#FF1493'},
  {id:'msl2', title:'Bling-Bang-Bang-Born', anime:'Mashle', ep:'OP 2', vid:'210R0ozmLwg', color:'#FFD700'},
  {id:'spy1', title:'Mixed Nuts', anime:'Spy × Family', ep:'OP 1', vid:'OVRkewDxFCE', color:'#FF7F50'},
  {id:'mob1', title:'99', anime:'Mob Psycho 100', ep:'OP 1', vid:'Bw-5Lpz7wA4', color:'#00FFFF'},
  {id:'fri1', title:'Yusha', anime:'Frieren', ep:'OP 1', vid:'OIBODIPC_8Y', color:'#4682B4'},
  {id:'ds1',  title:'Gurenge', anime:'Demon Slayer', ep:'OP 1', vid:'tGkHwD08kUM', color:'#2E8B57'},
  {id:'sl1',  title:'LEveL', anime:'Solo Leveling', ep:'OP 1', vid:'wYgH-u_KkH8', color:'#1E90FF'},
  {id:'op20', title:'PAINT', anime:'One Piece', ep:'OP 20', vid:'81X1gqH8l3s', color:'#FF8C00'},
  {id:'btr1', title:'Seishun Complex', anime:'Bocchi The Rock!', ep:'OP 1', vid:'Yd8kUoO7X8w', color:'#FF69B4'},
  {id:'zom1', title:'Song of the Dead', anime:'Zom 100', ep:'OP 1', vid:'l12y7D-bZ8o', color:'#00FA9A'},
  {id:'kju1', title:'Abyss', anime:'Kaiju No. 8', ep:'OP 1', vid:'y7L8V6o_qV0', color:'#32CD32'},
  {id:'dan1', title:'Otonoke', anime:'Dandadan', ep:'OP 1', vid:'d_gvxc-mS84', color:'#DA70D6'},
  {id:'cbe1', title:'This Fire', anime:'Cyberpunk Edgerunners', ep:'OP 1', vid:'JtP2I1_wKqM', color:'#FFFF00'}
];

const K = 32;
let ratings = {};
let pairs = [];
let pairIdx = 0;
let phase = 'intro';

function initELO() {
  ratings = {};
  openings.forEach(o => { ratings[o.id] = 1200; });
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function makePairs() {
  const shuffled = shuffle(openings);
  const ps = [];
  // Ensure every OP gets at least one match
  for (let i = 0; i < shuffled.length - 1; i += 2) {
    ps.push([shuffled[i], shuffled[i+1]]);
  }
  // Add a few more random matchups for better data
  const roundTwo = shuffle(openings);
  for (let i = 0; i < Math.min(10, roundTwo.length - 1); i += 2) {
    ps.push([roundTwo[i], roundTwo[i+1]]);
  }
  return ps;
}

function updateELO(winnerId, loserId) {
  const rW = ratings[winnerId];
  const rL = ratings[loserId];
  const eW = 1 / (1 + Math.pow(10, (rL - rW) / 400));
  const eL = 1 - eW;
  ratings[winnerId] = Math.round(rW + K * (1 - eW));
  ratings[loserId] = Math.round(rL + K * (0 - eL));
}

function ytEmbed(vid) {
  return `<div class="yt-wrap"><iframe src="https://www.youtube.com/embed/${vid}?autoplay=0&rel=0&showinfo=0&modestbranding=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>`;
}

function render() {
  const app = document.getElementById('app');
  if (phase === 'intro') {
    app.innerHTML = `
      <div class="header">
        <h1>Anime Opening Battle</h1>
        <p>${openings.length} Premium Openings · ELO Ranking System</p>
      </div>
      <div class="intro">
        <div style="font-size:54px;margin-bottom:20px;text-shadow:var(--glow);">⚔️</div>
        <h2>Which opening reigns supreme?</h2>
        <p>Two openings go head-to-head. Click the one you prefer.<br>After all battles, discover your ultimate ranking.</p>
        <button class="start-btn" onclick="startBattle()">Start Battle Sequence</button>
        <p style="margin-top:20px;font-size:12px;color:var(--text-muted);opacity:0.7;">${pairs.length || 13} matchups total</p>
      </div>`;
    return;
  }

  if (phase === 'done') {
    renderRankings();
    return;
  }

  const [a, b] = pairs[pairIdx];
  const prog = Math.round((pairIdx / pairs.length) * 100);

  app.innerHTML = `
    <div class="header">
      <h1>Anime Opening Battle</h1>
      <p>Match ${pairIdx + 1} of ${pairs.length}</p>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${prog}%"></div></div>
    
    <div class="battle-grid">
      <div class="card" id="card-a">
        ${ytEmbed(a.vid)}
        <div class="card-info">
          <div class="card-title">${a.title}</div>
          <div class="card-sub" style="color:${a.color}">${a.anime} · ${a.ep}</div>
          <button class="vote-btn" onclick="vote('a')">Vote ${a.title}</button>
        </div>
      </div>
      
      <div class="vs-badge">VS</div>
      
      <div class="card" id="card-b">
        ${ytEmbed(b.vid)}
        <div class="card-info">
          <div class="card-title">${b.title}</div>
          <div class="card-sub" style="color:${b.color}">${b.anime} · ${b.ep}</div>
          <button class="vote-btn" onclick="vote('b')">Vote ${b.title}</button>
        </div>
      </div>
    </div>
    <div class="skip-row">
      <button class="skip-btn" onclick="vote('skip')">I can't decide (Skip Match)</button>
    </div>`;
}

function startBattle() {
  initELO();
  pairs = makePairs();
  pairIdx = 0;
  phase = 'battle';
  render();
}

function vote(choice) {
  const [a, b] = pairs[pairIdx];
  if (choice === 'a') updateELO(a.id, b.id);
  else if (choice === 'b') updateELO(b.id, a.id);
  pairIdx++;
  if (pairIdx >= pairs.length) {
    phase = 'done';
  }
  render();
}

function renderRankings() {
  const sorted = [...openings].sort((a,b) => ratings[b.id] - ratings[a.id]);
  const maxElo = ratings[sorted[0].id];
  const minElo = ratings[sorted[sorted.length-1].id];
  const range = maxElo - minElo || 1;

  const medals = ['🥇','🥈','🥉'];
  const rowClass = ['gold','silver','bronze'];

  let rows = '';
  sorted.forEach((o, i) => {
    const elo = ratings[o.id];
    const barWidth = Math.round(((elo - minElo) / range) * 100) || 5; 
    const mc = i < 3 ? `rank-item ${rowClass[i]}` : 'rank-item';
    const medal = i < 3 ? `<span class="medal">${medals[i]}</span>` : `<span class="rank-num">#${i+1}</span>`;
    
    rows += `
      <div class="${mc}">
        ${medal}
        <div class="rank-info">
          <div class="rank-title">${o.title}</div>
          <div class="rank-sub" style="color:${o.color}">${o.anime} · ${o.ep}</div>
          <div class="elo-bar-wrap"><div class="elo-bar" style="width:${barWidth}%"></div></div>
        </div>
        <div class="rank-score">${elo}</div>
      </div>`;
  });

  const winner = sorted[0];
  document.getElementById('app').innerHTML = `
    <div class="header">
      <h1>Final Rankings</h1>
      <p>Determined by ELO Matchmaking</p>
    </div>
    <div class="winner-banner">
      <div class="big">👑</div>
      <h2>${winner.title}</h2>
      <p style="color:${winner.color}; font-weight:600; font-size:16px;">${winner.anime}</p>
      <p>Is the undisputed champion!</p>
    </div>
    <div class="rankings">${rows}</div>
    <button class="restart-btn" onclick="resetAll()">↺ Start New Tier List</button>`;
}

function resetAll() {
  phase = 'intro';
  pairs = [];
  pairIdx = 0;
  ratings = {};
  render();
}

render();
</script>
</body>
</html>
