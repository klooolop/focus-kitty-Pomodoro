<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Opening Battle</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --font-sans: 'Poppins', sans-serif;
  --bg-main: #0b0c10;
  --bg-card: rgba(31, 40, 51, 0.65);
  --accent: #66fcf1;
  --accent-dim: #45a29e;
  --text-main: #ffffff;
  --text-muted: #c5c6c7;
  --border-radius: 16px;
  --glow: 0 0 15px rgba(102, 252, 241, 0.35);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-sans);
  background: var(--bg-main);
  background-image: radial-gradient(circle at top right, #1f2833 0%, transparent 40%),
                    radial-gradient(circle at bottom left, #12181f 0%, transparent 40%);
  color: var(--text-main);
  min-height: 100vh;
}

.arena { max-width: 1000px; margin: 0 auto; padding: 2rem 1rem; min-height: 600px; }

.header { text-align: center; margin-bottom: 2rem; }
.header h1 { font-size: 28px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; text-shadow: var(--glow); margin-bottom: 8px; }
.header p { font-size: 14px; color: var(--text-muted); }

.progress-bar-wrap { background: rgba(255,255,255,0.05); border-radius: 99px; height: 8px; margin: 20px 0; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
.progress-bar-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: var(--glow); }

.battle-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 1.5rem; align-items: center; margin-bottom: 1.5rem; }

.vs-badge { font-size: 22px; font-weight: 700; color: var(--bg-main); background: var(--accent); width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; border-radius: 50%; box-shadow: var(--glow); margin: 0 auto; z-index: 2; }

.card { background: var(--bg-card); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--border-radius); overflow: hidden; transition: all 0.3s ease; display: flex; flex-direction: column; }
.card:hover { border-color: var(--accent); transform: translateY(-4px); box-shadow: 0 10px 25px rgba(0,0,0,0.5), var(--glow); }

.yt-wrap { position: relative; padding-top: 56.25%; background: #000; border-bottom: 1px solid rgba(255,255,255,0.05); }
.yt-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

.spotify-wrap { padding: 8px 12px 10px; background: rgba(29,185,84,0.06); border-bottom: 1px solid rgba(29,185,84,0.12); }
.spotify-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #1DB954; margin-bottom: 5px; display: flex; align-items: center; gap: 5px; }
.spotify-label svg { flex-shrink: 0; }

.card-info { padding: 1.2rem; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
.card-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-sub { font-size: 12px; font-weight: 500; letter-spacing: 0.5px; margin-bottom: 15px; }

.vote-btn { width: 100%; padding: 11px; border: 2px solid var(--accent-dim); border-radius: 8px; background: transparent; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--accent); font-family: var(--font-sans); transition: all 0.2s; text-transform: uppercase; margin-top: auto; }
.vote-btn:hover { background: var(--accent); color: var(--bg-main); box-shadow: var(--glow); }
.vote-btn:active { transform: scale(0.97); }

.skip-row { text-align: center; margin-top: 1rem; }
.skip-btn { background: none; border: none; font-size: 13px; color: var(--text-muted); cursor: pointer; transition: color 0.2s; }
.skip-btn:hover { color: var(--text-main); text-decoration: underline; }

.rankings { padding: 1.5rem 0; display: grid; grid-template-columns: 1fr; gap: 10px; }
@media (min-width: 768px) { .rankings { grid-template-columns: 1fr 1fr; gap: 15px; } }

.rank-item { display: flex; align-items: center; gap: 15px; padding: 12px 16px; background: var(--bg-card); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; transition: transform 0.2s; }
.rank-item:hover { transform: translateX(4px); background: rgba(31, 40, 51, 0.9); border-color: rgba(255,255,255,0.2); }
.rank-item.gold { border: 1px solid #FFD700; box-shadow: 0 0 10px rgba(255, 215, 0, 0.15); }
.rank-item.silver { border: 1px solid #C0C0C0; }
.rank-item.bronze { border: 1px solid #CD7F32; }

.rank-num { font-size: 18px; font-weight: 700; min-width: 35px; color: var(--text-muted); }
.rank-info { flex: 1; min-width: 0; }
.rank-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rank-sub { font-size: 12px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rank-score { font-size: 15px; font-weight: 700; color: var(--accent); min-width: 55px; text-align: right; }

.elo-bar-wrap { height: 4px; background: rgba(255,255,255,0.1); border-radius: 99px; margin-top: 8px; overflow: hidden; }
.elo-bar { height: 100%; background: var(--accent); border-radius: 99px; box-shadow: var(--glow); }

.medal { font-size: 22px; min-width: 35px; }

.winner-banner { text-align: center; padding: 2.5rem 1rem; background: linear-gradient(135deg, rgba(31,40,51,0.9), rgba(11,12,16,0.9)); border-radius: var(--border-radius); border: 1px solid var(--accent); box-shadow: var(--glow); margin-bottom: 2rem; }
.winner-banner .big { font-size: 50px; margin-bottom: 10px; animation: bounce 2s infinite; }
.winner-banner h2 { font-size: 24px; font-weight: 700; color: var(--accent); }
.winner-banner p { font-size: 15px; color: var(--text-muted); margin-top: 8px; }

.intro { text-align: center; padding: 3rem 1rem; background: var(--bg-card); border-radius: var(--border-radius); border: 1px solid rgba(255,255,255,0.1); margin-top: 2rem; }
.intro h2 { font-size: 24px; font-weight: 600; margin-bottom: 12px; color: var(--text-main); }
.intro p { font-size: 15px; color: var(--text-muted); margin-bottom: 2rem; line-height: 1.6; }

.start-btn { padding: 14px 40px; background: var(--accent); color: var(--bg-main); border: none; border-radius: 8px; font-size: 16px; font-weight: 700; font-family: var(--font-sans); cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 1px; box-shadow: var(--glow); }
.start-btn:hover { transform: translateY(-2px); box-shadow: 0 0 25px rgba(102, 252, 241, 0.6); background: #7ffff8; }
.restart-btn { display: block; width: 100%; max-width: 300px; margin: 2rem auto 0; padding: 14px; border: 2px solid var(--accent-dim); border-radius: 8px; background: transparent; cursor: pointer; font-size: 14px; font-weight: 600; color: var(--accent); transition: all 0.2s; text-transform: uppercase; }
.restart-btn:hover { background: var(--accent); color: var(--bg-main); box-shadow: var(--glow); }

@keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
@media (max-width: 768px) { .battle-grid { grid-template-columns: 1fr; gap: 1rem; } .vs-badge { margin: -5px auto; } }
</style>

const K = 32;
let ratings = {};
let pairs = [];
let pairIdx = 0;
let phase = 'intro';

function initELO() {
  ratings = {};
  openings.forEach(o => { ratings[o.id] = 1200; });
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function makePairs() {
  const shuffled = shuffle(openings);
  const ps = [];
  
  for (let i = 0; i < shuffled.length - 1; i += 2) {
    ps.push([shuffled[i], shuffled[i+1]]);
  }
  
  const roundTwo = shuffle(openings);
  for (let i = 0; i < roundTwo.length - 1; i += 2) {
    ps.push([roundTwo[i], roundTwo[i+1]]);
  }
  return ps;
}

function updateELO(winnerId, loserId) {
  const rW = ratings[winnerId];
  const rL = ratings[loserId];
  const eW = 1 / (1 + Math.pow(10, (rL - rW) / 400));
  const eL = 1 - eW;
  ratings[winnerId] = Math.round(rW + K * (1 - eW));
  ratings[loserId] = Math.round(rL + K * (0 - eL));
}

// Fixed function: Only renders Spotify if sid is provided
function renderMedia(item) {
  const ytIframe = `
    <div class="yt-wrap">
      <iframe src="https://www.youtube.com/embed/${item.vid}?autoplay=0&rel=0&modestbranding=1" 
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
      allowfullscreen></iframe>
    </div>`;

  let spotifyIframe = '';
  if (item.sid) {
    const spotifyUrl = `https://open.spotify.com/embed/track/${item.sid}?utm_source=generator&theme=0`;
    const spotifyIcon = `<svg width="12" height="12" viewBox="0 0 24 24" fill="#1DB954" xmlns="http://www.w3.org/2000/svg"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>`;
    
    spotifyIframe = `
      <div class="spotify-wrap">
        <div class="spotify-label">${spotifyIcon} Spotify Audio</div>
        <iframe style="border-radius:8px" src="${spotifyUrl}" width="100%" height="80" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
      </div>`;
  }

  return ytIframe + spotifyIframe;
}

function getAnimeColor(anime) {
  const colors = {
    'Naruto':'#E8834A','Naruto Shippuden':'#D85A30','Death Note':'#ff4a4a',
    'My Hero Academia':'#4CAF82','One Piece':'#2196F3','Dandadan':'#E91E63',
    'Tokyo Ghoul':'#9C27B0','Tokyo Revengers':'#FF5722','Dragon Ball Super':'#FFC107',
    'Fullmetal Alchemist':'#795548','FMA Brotherhood':'#A0522D','Jujutsu Kaisen':'#1B5E20',
    'Jujutsu Kaisen S2':'#388E3C','Chainsaw Man':'#B71C1C','Attack on Titan':'#37474F',
    '86 Eighty Six':'#546E7A','Psycho-Pass':'#1565C0','Monster':'#8B4513',
    'Code Geass':'#ba55d3','JoJo\'s Bizarre Adventure':'#6A1B9A','Demon Slayer':'#C62828',
    'Demon Slayer S3':'#AD1457','Hunter x Hunter':'#1A237E','Cowboy Bebop':'#BF360C',
    'Neon Genesis Evangelion':'#4A148C','Sword Art Online':'#1B5E20','Steins;Gate':'#E65100',
    'One Punch Man':'#F9A825','Re:Zero':'#0D47A1','Vinland Saga':'#3E2723',
    'Terror in Resonance':'#5f9ea0','Black Clover':'#1B5E20','Mob Psycho 100':'#E91E63',
    'Spy × Family':'#BF360C',
  };
  return colors[anime] || '#66fcf1';
}

function render() {
  const app = document.getElementById('app');
  if (phase === 'intro') {
    app.innerHTML = `
      <div class="header">
        <h1>Anime Opening Battle</h1>
        <p>${openings.length} openings · ELO ranking system</p>
      </div>
      <div class="intro">
        <div style="font-size:54px;margin-bottom:16px;text-shadow:var(--glow);">⚔️</div>
        <h2>Which opening reigns supreme?</h2>
        <p>Two openings go head-to-head. Click the one you prefer.<br>After all battles, see the ultimate ranking.</p>
        <button class="start-btn" onclick="startBattle()" style="margin-top:24px">Start the battles</button>
      </div>`;
    return;
  }

  if (phase === 'done') {
    renderRankings();
    return;
  }

  const [a, b] = pairs[pairIdx];
  const prog = Math.round((pairIdx / pairs.length) * 100);

  app.innerHTML = `
    <div class="header">
      <h1>Anime Opening Battle</h1>
      <p>Match ${pairIdx + 1} of ${pairs.length} · ELO ranking</p>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${prog}%"></div></div>
    <div style="font-size: 13px; color: var(--text-muted); text-align:center; margin-bottom:12px; font-weight:500; text-transform:uppercase; letter-spacing:1px;">Select your preference</div>
    <div class="battle-grid">
      <div class="card" id="card-a">
        ${renderMedia(a)}
        <div class="card-info">
          <div class="card-title">${a.title}</div>
          <div class="card-sub" style="color:${getAnimeColor(a.anime)}">${a.anime} · ${a.ep}</div>
          <button class="vote-btn" onclick="vote('a')">Pick This One</button>
        </div>
      </div>
      <div class="vs-badge">VS</div>
      <div class="card" id="card-b">
        ${renderMedia(b)}
        <div class="card-info">
          <div class="card-title">${b.title}</div>
          <div class="card-sub" style="color:${getAnimeColor(b.anime)}">${b.anime} · ${b.ep}</div>
          <button class="vote-btn" onclick="vote('b')">Pick This One</button>
        </div>
      </div>
    </div>
    <div class="skip-row">
      <button class="skip-btn" onclick="vote('skip')">Skip this match</button>
    </div>`;
}

function startBattle() {
  initELO();
  pairs = makePairs();
  pairIdx = 0;
  phase = 'battle';
  render();
}

function vote(choice) {
  const [a, b] = pairs[pairIdx];
  if (choice === 'a') updateELO(a.id, b.id);
  else if (choice === 'b') updateELO(b.id, a.id);
  pairIdx++;
  if (pairIdx >= pairs.length) {
    phase = 'done';
  }
  render();
}

function renderRankings() {
  const sorted = [...openings].sort((a,b) => ratings[b.id] - ratings[a.id]);
  const maxElo = ratings[sorted[0].id];
  const minElo = ratings[sorted[sorted.length-1].id];
  const range = maxElo - minElo || 1;

  const medals = ['🥇','🥈','🥉'];
  const rowClass = ['gold','silver','bronze'];

  let rows = '';
  sorted.forEach((o, i) => {
    const elo = ratings[o.id];
    const barWidth = Math.round(((elo - minElo) / range) * 100) || 5;
    const mc = i < 3 ? `rank-item ${rowClass[i]}` : 'rank-item';
    const medal = i < 3 ? `<span class="medal">${medals[i]}</span>` : `<span class="rank-num">#${i+1}</span>`;
    rows += `
      <div class="${mc}">
        ${medal}
        <div class="rank-info">
          <div class="rank-title">${o.title}</div>
          <div class="rank-sub" style="color:${getAnimeColor(o.anime)}">${o.anime} · ${o.ep}</div>
          <div class="elo-bar-wrap"><div class="elo-bar" style="width:${barWidth}%"></div></div>
        </div>
        <div class="rank-score">${elo}</div>
      </div>`;
  });

  const winner = sorted[0];
  document.getElementById('app').innerHTML = `
    <div class="header"><h1>Final Rankings</h1><p>Based on ${pairs.length} battles · ELO scores</p></div>
    <div class="winner-banner">
      <div class="big">👑</div>
      <h2>${winner.title}</h2>
      <p style="color:${getAnimeColor(winner.anime)}; font-weight:600;">${winner.anime}</p>
      <p>is your #1 anime opening!</p>
    </div>
    <div class="rankings">${rows}</div>
    <button class="restart-btn" onclick="resetAll()">↺ Start new battle</button>`;
}

function resetAll() {
  phase = 'intro';
  pairs = [];
  pairIdx = 0;
  ratings = {};
  render();
}

render();
</script>
